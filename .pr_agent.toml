[pr_reviewer]
extra_instructions = """
1. Read AGENTS.md for repository-specific review guidelines
2. This repository is a fork – verify proper attribution and documentation
3. Check that fork-specific changes are clearly marked and explained
"""
require_all_thresholds_for_incremental_review = false

[pr_code_suggestions]
num_code_suggestions = 4

[pr_description]
enable_semantic_files_types = true

[config]
verbosity_level = 1
